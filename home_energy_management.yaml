# =============================================================================
# Home Energy Management - Version ESPHome
# Portage du projet C++ Home_Energy_Management (PlatformIO/Arduino)
# =============================================================================
# Matériel :
#   - ESP32 DevKit (esp32dev)
#   - MPPT eSmart3 sur RS485        (RX 16 / TX 17 / DE 4)
#   - JK BMS sur RS485              (RX 18 / TX 19 / DE 23)
#   - 2x PZEM-004T v3 sur Modbus    (RX 13 / TX 14, adresses 1 et 2)
#   - JBD BMS via BLE               (adresse MAC dans secrets.yaml)
#   - RTC DS3231 sur I2C            (SDA 21 / SCL 22)
#   - 4 relais (25/26/27/32, actifs à l'état bas), 4 entrées (33/34/35/36)
# =============================================================================

substitutions:
  name: hem
  friendly_name: "Home Energy Management"

  # --- Pins (identiques à src/config.h du projet d'origine) ---
  mppt_rx_pin: "16"
  mppt_tx_pin: "17"
  mppt_de_pin: "4"
  pzem_rx_pin: "13"
  pzem_tx_pin: "14"
  jk_rx_pin: "18"
  jk_tx_pin: "19"
  jk_de_pin: "23"
  i2c_sda_pin: "21"
  i2c_scl_pin: "22"
  relay_1_pin: "25"
  relay_2_pin: "26"
  relay_3_pin: "27"
  relay_4_pin: "32"
  input_1_pin: "33"
  input_2_pin: "34"
  input_3_pin: "35"
  input_4_pin: "36"
  status_led_pin: "2"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # Équivalent de l'ID unique hem-XXXX du projet d'origine (suffixe MAC)
  name_add_mac_suffix: true
  on_boot:
    priority: -100
    then:
      # Restaurer l'heure depuis le DS3231 en attendant la synchro NTP
      - ds1307.read_time:

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Composant custom eSmart3 (portage du protocole Joba_ESmart3)
# + composants syssi pour JK BMS (RS485) et JBD BMS (BLE)
external_components:
  - source:
      type: local
      path: components
  - source: github://syssi/esphome-jk-bms@main
    refresh: 1d
  - source: github://syssi/esphome-jbd-bms@main
    refresh: 1d

packages:
  wifi: !include packages/wifi.yaml
  mqtt: !include packages/mqtt.yaml
  system: !include packages/system.yaml
  gpio: !include packages/gpio.yaml
  pzem: !include packages/pzem.yaml
  mppt: !include packages/mppt_esmart3.yaml
  jk_bms: !include packages/jk_bms.yaml
  jbd_bms: !include packages/jbd_bms_ble.yaml
  protection: !include packages/battery_protection.yaml
  energy: !include packages/energy.yaml

logger:
  level: INFO
  # ESP32 = 3 UART matériels, tous utilisés (PZEM, eSmart3, JK BMS).
  # Le projet d'origine utilisait SoftwareSerial pour le MPPT ; ESPHome n'en a
  # pas, donc on libère UART0 en désactivant le log série. Les logs restent
  # visibles via MQTT (topic <nom>/debug) et l'interface web.
  baud_rate: 0
