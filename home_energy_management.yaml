# =============================================================================
# Home Energy Management - Version ESPHome
# Portage du projet C++ Home_Energy_Management (PlatformIO/Arduino)
# https://github.com/C00L4LIFE/HEM_ESPHOME
# =============================================================================
# Matériel :
#   - ESP32 DevKit (esp32dev)
#   - MPPT eSmart3 sur RS485        (RX 16 / TX 17 / DE 4)
#   - 2x PZEM-004T v3 sur Modbus    (RX 13 / TX 14, adresses 1 et 2)
#   - JBD BMS via BLE               (adresse MAC dans secrets.yaml)
#   - RTC DS3231 sur I2C            (SDA 21 / SCL 22)
#   - 4 relais (25/26/27/32, actifs à l'état bas), 4 entrées (33/34/35/36)
# =============================================================================

substitutions:
  name: hem
  friendly_name: "Home Energy Management"

  # --- Pins (identiques à src/config.h du projet d'origine) ---
  mppt_rx_pin: "16"
  mppt_tx_pin: "17"
  mppt_de_pin: "4"
  pzem_rx_pin: "13"
  pzem_tx_pin: "14"
  i2c_sda_pin: "21"
  i2c_scl_pin: "22"
  relay_1_pin: "25"
  relay_2_pin: "26"
  relay_3_pin: "27"
  relay_4_pin: "32"
  input_1_pin: "33"
  input_2_pin: "34"
  input_3_pin: "35"
  input_4_pin: "36"
  status_led_pin: "2"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  # Équivalent de l'ID unique hem-XXXX du projet d'origine (suffixe MAC)
  name_add_mac_suffix: true
  on_boot:
    priority: -100
    then:
      # Restaurer l'heure depuis le DS3231 en attendant la synchro NTP
      - ds1307.read_time:

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# Composant custom eSmart3 (portage du protocole Joba_ESmart3)
# + composant syssi pour JBD BMS (BLE)
# Les deux sont récupérés depuis GitHub : ce fichier et secrets.yaml
# suffisent, pas besoin de cloner packages/ ni components/.
# Note : le JK BMS est géré par un device ESP32 dédié séparé (jk-bms /
# esp32-ble-v19-dual_bms.yaml), pas par celui-ci.
external_components:
  - source: github://C00L4LIFE/HEM_ESPHOME@main
    components: [esmart3]
    refresh: 1d
  - source: github://syssi/esphome-jbd-bms@main
    refresh: 1d

# Packages récupérés depuis GitHub (même mécanisme que external_components
# ci-dessus). refresh: 1d => après une modification poussée sur main, relancer
# `esphome clean home_energy_management.yaml` pour forcer le re-téléchargement
# immédiatement au lieu d'attendre l'expiration du cache.
packages:
  hem:
    url: https://github.com/C00L4LIFE/HEM_ESPHOME
    ref: main
    refresh: 1d
    files:
      - packages/wifi.yaml
      - packages/mqtt.yaml
      - packages/system.yaml
      - packages/gpio.yaml
      - packages/pzem.yaml
      - packages/mppt_esmart3.yaml
      - packages/jbd_bms_ble.yaml
      - packages/battery_protection.yaml
      - packages/energy.yaml

logger:
  level: INFO
  # ESP32 = 3 UART matériels : UART0 (logger, ce port série) + PZEM + eSmart3.
  # Ça tient tout juste (retrait de JK BMS, géré par un device séparé, qui
  # aurait nécessité un 4e UART).
