# =============================================================================
# PZEM-004T v3 (Modbus RTU) - pzem_manager.cpp
# 2 modules sur le même bus UART :
#   adresse 0x01 = Consommation AC (charge maison)
#   adresse 0x02 = Réseau secteur (EDF/Grid)
# =============================================================================

uart:
  - id: uart_pzem
    # Pull-up interne sur RX : la sortie TTL du PZEM passe par un
    # optocoupleur qui peut laisser la ligne flottante au repos. Le
    # framework Arduino (utilisé par le firmware d'origine) l'active
    # souvent par défaut ; ESP-IDF (utilisé ici) ne le fait pas.
    rx_pin:
      number: ${pzem_rx_pin}
      mode:
        input: true
        pullup: true
    tx_pin: ${pzem_tx_pin}
    baud_rate: 9600

modbus:
  - id: modbus_pzem
    uart_id: uart_pzem

sensor:
  # --- PZEM 1 : Consommation AC (charge) ---
  - platform: pzemac
    modbus_id: modbus_pzem
    address: 1
    update_interval: 2s
    voltage:
      name: "Conso AC Tension"
      id: pzem_ac_load_voltage
    current:
      name: "Conso AC Courant"
      id: pzem_ac_load_current
    power:
      name: "Conso AC Puissance"
      id: pzem_ac_load_power
    energy:
      name: "Conso AC Énergie"
      id: pzem_ac_load_energy
      filters:
        - multiply: 0.001  # Wh -> kWh
      unit_of_measurement: kWh
    frequency:
      name: "Conso AC Fréquence"
    power_factor:
      name: "Conso AC Facteur de puissance"

  # --- PZEM 2 : Réseau secteur (EDF/Grid) ---
  - platform: pzemac
    modbus_id: modbus_pzem
    address: 2
    update_interval: 2s
    voltage:
      name: "Secteur Tension"
      id: pzem_grid_voltage
    current:
      name: "Secteur Courant"
      id: pzem_grid_current
    power:
      name: "Secteur Puissance"
      id: pzem_grid_power
    energy:
      name: "Secteur Énergie"
      id: pzem_grid_energy
      filters:
        - multiply: 0.001  # Wh -> kWh
      unit_of_measurement: kWh
    frequency:
      name: "Secteur Fréquence"
    power_factor:
      name: "Secteur Facteur de puissance"
