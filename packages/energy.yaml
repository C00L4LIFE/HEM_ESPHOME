# =============================================================================
# Capteurs dérivés (calculs de main.cpp / ha_manager.cpp) :
#   - puissance maison = PV - charge batterie
#   - puissance batterie lissée (table circulaire, fenêtre et intervalle
#     réglables depuis Home Assistant - numbers "Batterie Lissage ...")
#   - énergie restante / nominale batterie (Wh)
#   - temps restant estimé (min ; négatif = temps de charge)
#   - énergie batterie chargée/déchargée cumulée (kWh, tableau de bord
#     Énergie de Home Assistant) : le composant jbd_bms_ble ne fournit que
#     des puissances instantanées, pas de compteur kWh natif ; on intègre
#     charging_power/discharging_power dans le temps (platform: integration).
# =============================================================================

# Table circulaire du lissage de puissance batterie. Implémentée à la main
# (plutôt que sliding_window_moving_average) parce que la taille de fenêtre
# et l'intervalle du filtre ESPHome sont figés à la compilation, alors
# qu'ici ils sont réglables à chaud via les numbers ci-dessous.
globals:
  - id: pw_avg_buffer
    type: float[100]
  - id: pw_avg_idx
    type: int
    initial_value: '0'
  - id: pw_avg_count
    type: int
    initial_value: '0'
  - id: pw_avg_last_ms
    type: uint32_t
    initial_value: '0'

number:
  # Nombre de lectures moyennées (taille de fenêtre effective). La table fait
  # toujours 100 cases ; réduire la fenêtre n'utilise que les N plus récentes.
  - platform: template
    name: "Batterie Lissage Fenêtre"
    id: pw_avg_window
    min_value: 1
    max_value: 100
    step: 1
    initial_value: 100
    restore_value: true
    optimistic: true
    entity_category: config
    mode: box
    icon: "mdi:chart-bell-curve"

  # Intervalle entre deux lectures. Fenêtre x intervalle = durée de lissage
  # (100 x 1 s = ~1 min 40). Le BMS publie toutes les 2 s : sous 2 s certaines
  # lectures consécutives seront identiques, sans fausser la moyenne.
  - platform: template
    name: "Batterie Lissage Intervalle"
    id: pw_avg_interval
    min_value: 1
    max_value: 30
    step: 1
    initial_value: 1
    restore_value: true
    optimistic: true
    entity_category: config
    unit_of_measurement: s
    mode: box
    icon: "mdi:timer-outline"

sensor:
  # Puissance batterie signée (+ = charge) lissée sur la table circulaire :
  # une lecture par intervalle dans la case 0..99 (retour à 0 après 99),
  # moyenne = somme des cases / nombre de cases ; tant que la table n'est
  # pas pleine, seules les cases alimentées comptent.
  - platform: template
    name: "Batterie Puissance moyenne"
    id: battery_power_avg
    unit_of_measurement: W
    device_class: power
    accuracy_decimals: 1
    update_interval: 1s
    lambda: |-
      float v = id(jbd_power).state;
      if (isnan(v)) return {};
      uint32_t now = millis();
      uint32_t interval_ms = (uint32_t) id(pw_avg_interval).state * 1000;
      if (interval_ms < 1000) interval_ms = 1000;
      if (id(pw_avg_count) > 0 && (now - id(pw_avg_last_ms)) < interval_ms)
        return {};  // pas encore l'heure d'échantillonner
      id(pw_avg_last_ms) = now;
      id(pw_avg_buffer)[id(pw_avg_idx)] = v;
      id(pw_avg_idx) = (id(pw_avg_idx) + 1) % 100;
      if (id(pw_avg_count) < 100)
        id(pw_avg_count) += 1;
      int window = (int) id(pw_avg_window).state;
      if (window < 1) window = 1;
      if (window > 100) window = 100;
      int n = id(pw_avg_count) < window ? id(pw_avg_count) : window;
      float sum = 0;
      int pos = id(pw_avg_idx);
      for (int i = 0; i < n; i++) {
        pos = (pos + 99) % 100;  // recule d'une case (les n plus récentes)
        sum += id(pw_avg_buffer)[pos];
      }
      return sum / n;

  # Puissance consommée par la maison côté DC :
  # house_power = pv_power - puissance de charge batterie
  - platform: template
    name: "Maison Puissance"
    id: house_power
    unit_of_measurement: W
    device_class: power
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float pv = id(mppt_pv_power).state;
      float bat = id(jbd_power).state;   // + = charge batterie
      if (isnan(pv)) return {};
      if (isnan(bat)) bat = 0;
      float p = pv - bat;
      // Clampé à 0 : un écart de mesure peut donner une valeur légèrement
      // négative, mais une "puissance maison" n'a pas de sens physique < 0
      // (et l'intégration en énergie cumulée ci-dessous exige une source >= 0).
      return p < 0 ? 0 : p;

  # Énergie maison cumulée (kWh), équivalent house_energy de ha_manager.cpp.
  - platform: integration
    name: "Maison Énergie"
    id: house_energy
    sensor: house_power
    time_unit: h
    restore: true
    device_class: energy
    state_class: total_increasing
    unit_of_measurement: kWh
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # Énergie restante batterie en Wh (capacité restante Ah x tension)
  - platform: template
    name: "Batterie Énergie restante"
    id: battery_remaining_wh
    unit_of_measurement: Wh
    device_class: energy_storage
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float ah = id(jbd_capacity_remaining).state;
      float v = id(jbd_voltage).state;
      if (isnan(ah) || isnan(v)) return {};
      return ah * v;

  # Énergie nominale batterie en Wh (capacité nominale Ah x tension),
  # équivalent battery_nominal_energy de ha_manager.cpp
  - platform: template
    name: "Batterie Énergie nominale"
    id: battery_nominal_energy_wh
    unit_of_measurement: Wh
    device_class: energy_storage
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float ah = id(jbd_nominal_capacity).state;
      float v = id(jbd_voltage).state;
      if (isnan(ah) || isnan(v)) return {};
      return ah * v;

  # Énergie batterie chargée/déchargée cumulée (kWh) - compatible tableau de
  # bord Énergie de Home Assistant. Intégration temporelle de la puissance
  # (W) en Wh (time_unit: h) puis conversion en kWh (filtre multiply).
  # restore: true pour ne pas repartir de zéro à chaque redémarrage.
  - platform: integration
    name: "Batterie Énergie chargée"
    id: battery_energy_charged
    sensor: jbd_charging_power
    time_unit: h
    restore: true
    device_class: energy
    state_class: total_increasing
    unit_of_measurement: kWh
    accuracy_decimals: 3
    filters:
      - multiply: 0.001
  - platform: integration
    name: "Batterie Énergie déchargée"
    id: battery_energy_discharged
    sensor: jbd_discharging_power
    time_unit: h
    restore: true
    device_class: energy
    state_class: total_increasing
    unit_of_measurement: kWh
    accuracy_decimals: 3
    filters:
      - multiply: 0.001

  # Temps restant estimé (minutes) - formule du main.cpp :
  #   décharge : réserve de 20 Ah conservée si capacité > 20 Ah
  #   charge   : valeur négative = temps de charge restant
  - platform: template
    name: "Batterie Temps restant estimé"
    id: battery_time_remaining
    unit_of_measurement: min
    icon: "mdi:timer-sand"
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float cur = id(jbd_current).state;
      float v = id(jbd_voltage).state;
      float rem_ah = id(jbd_capacity_remaining).state;
      float nom_ah = id(jbd_nominal_capacity).state;
      float avg_p = id(battery_power_avg).state;
      if (isnan(cur) || isnan(v) || isnan(rem_ah) || isnan(nom_ah) || isnan(avg_p))
        return {};
      float rem_wh = rem_ah * v;
      if (cur < -0.1f && avg_p < -1.0f) {
        // Décharge
        if (rem_ah > 20.0f)
          return (rem_wh - (20.0f * v)) / (-avg_p) * 60.0f;
        return rem_wh / (-avg_p) * 60.0f;
      } else if (cur > 0.1f && avg_p > 1.0f) {
        // Charge (temps négatif comme dans le projet d'origine)
        float missing_wh = (nom_ah - rem_ah) * v;
        return -(missing_wh / avg_p * 60.0f);
      }
      return 0.0f;
